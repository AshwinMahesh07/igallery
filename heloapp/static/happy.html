<!DOCTYPE html>
<html>
<head>
    <title>Image Gallery</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .content {
            flex: 1;
        }
        img {
            width: 400px;
            height: 300px;
            border-radius: 10px;
        }
        button {
            padding: 10px;
            margin: 10px;
            font-size: 16px;
        }
        footer {
            background-color: rgb(57, 211, 75);
            padding: 10px;
        }
    </style>
</head>
<body>

    <div class="content">
        <h2>Simple Image Gallery</h2>

        <img id="gallery" src="img1.jpg">

        <br>

        <button onclick="prevImage()">Previous</button>
        <button onclick="nextImage()">Next</button>
    </div>

    <footer>
        
        Ashwin Kumar .M || 25009408
    </footer>

    <script>
        let images = [
            "a1.jpg",
            "a2.jpg",
            "a3.jpg",
            "a4.jpg",
        ];

        let index = 0;

        function nextImage() {
            index = (index + 1) % images.length;
            document.getElementById("gallery").src = images[index];
        }

        function prevImage() {
            index = (index - 1 + images.length) % images.length;
            document.getElementById("gallery").src = images[index];
        }
    </script>

</body>
</html>
